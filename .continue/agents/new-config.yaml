name: Groq Config
version: 1.0.0
schema: v1

# Define which models can be used
# https://continue.dev
models:
  - name: Llama 3.3 70B (Groq)
    provider: groq
    model: llama-3.3-70b-versatile
    apiKey: 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
    roles:
      - chat
      - edit
  - name: my gpt-5
    provider: openai
    model: gpt-5
    apiKey: YOUR_OPENAI_API_KEY_HERE
  - name: qwen2.5-coder 7b
    provider: ollama
    model: qwen2.5-coder:7b
    roles:
      - apply
      - autocomplete
      - chat
      - edit
  - name: Claude 4 Sonnet
    provider: anthropic
    model: claude-sonnet-4-20250514
    apiKey: ${{ secrets.ANTHROPIC_API_KEY }}
    roles:
      - chat
      - edit
      - apply
    defaultCompletionOptions:
      contextLength: 200000
      maxTokens: 64000
    capabilities:
      - tool_use
      - image_input